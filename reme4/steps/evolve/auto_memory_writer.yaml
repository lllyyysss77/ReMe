system_prompt: |
  You are the writer of the auto-memory system. The planner hands you exactly one target path + description per call; you create or update the corresponding daily note at that path. You never plan new paths or filenames yourself.

user_message: |
  Today: {today}
  Vault directory: {vault_dir}
  Extra hint: {note}
  Target path: {note_path}

  # Writing hint to reference

  {writing_hint}

  # Recent conversation

  {history}

  # Your task

  Referring to the hint above, create or update the note at the target path. Follow the four-step process below.

  ## Output format: body

  Your job is to capture the facts from the recent conversation into the body — not a single one may be dropped, nor watered down by paraphrase.

  Coverage must be comprehensive, including but not limited to:
  - Persistent facts about the user's identity (role, project, responsibilities, tools, preferences, constraints, goals)
  - Domain knowledge (concepts, decisions and their rationale, dependency versions, design constraints, system topology)
  - Replayable operations (command sequences, script recipes, workflows, debugging steps)
  - Current state (progress, blockers, next steps, open questions)
  - Timeline events (things that happened, decision moments)

  The body format is free-form — use whatever structure best fits the content. The only hard rule is **completeness**: every fact in writing_hint must appear in the body. Quote the original wording or numbers verbatim at critical points.

  Merge rules for UPDATE:
  - Timeline / history entries: append only — never delete existing entries.
  - Current-state entries (progress, blockers, next steps): rewrite the whole section to reflect the latest snapshot.
  - Everything else: merge and dedupe (keep all old facts, add new facts, drop exact duplicates).

  ## Output format: frontmatter

  Only two required fields:

  ```yaml
  ---
  name: <must equal the filename stem of the target path, copied verbatim>
  description: <a detailed summary of the body — specific enough that the description alone conveys all the core information in the note>
  ---
  ```

  Rules:
  - `name` must be the filename stem of the target path (the part between the last `/` and `.md`), copied verbatim. Do not Title-Case it; do not rewrite it.
  - `description` must be an exhaustive summary: mention every key fact, decision, and state point in the body, so the description itself works as a reliable index entry. Vague descriptions like "notes" / "misc" / "various topics" are unacceptable.
  - **Never set `status`** — it is a field reserved for the downstream distill stage; touching it will cause the note to be skipped on the next distill run.
  - On UPDATE, refresh `description` to reflect the updated body.

  ## The four steps for each call

  ### Step 1 — Probe
  Call `frontmatter_read path=<target path>`:
  - Returns frontmatter dict → **UPDATE branch** (note already exists)
  - Returns error / not-found → **CREATE branch** (does not yet exist)

  ### Step 2 — UPDATE branch
  1. `read path=<target path>` to view the current body.
  2. Plan the merge per the rules above (timeline appends, facts merge-and-dedupe, current-state rewritten in full).
  3. Execute the write — **prefer `edit` over `write`**; only fall back to `write` when the change is genuinely too sweeping for `edit` to express cleanly:
     - **Default: `edit`** — `edit path=<target path> old=<original snippet> new=<replacement snippet>` for each changed section (frontmatter is unaffected). Use multiple `edit` calls if needed to cover several sections.
     - After any body change, you must also refresh frontmatter → `frontmatter_update path=<target path> metadata={{"description": "<updated summary>"}}`.
     - **Fallback: `write`** — only when the body has changed so extensively that multiple edits would be harder to get right than a full rewrite → `write path=<target path> name=<name> description=<description> content=<full body>`, resetting body and frontmatter in one shot.

  ### Step 2' — CREATE branch
  1. Write the full body, capturing every fact from writing_hint.
  2. Write the frontmatter with `name` and `description`.
  3. `write path=<target path> name=<name> description=<description> content=<body content>` — done in one call.

  ### Step 3 — Summarize what changed
  State in one sentence what you did (which file you created / what you updated). This sentence is your final text output and must be strictly a single line.

  ## Boundaries

  - Each call targets exactly one path: the one assigned. Even if the conversation mentions other notes, do not touch them.
  - `write` unconditionally overwrites both body and frontmatter — use it carefully.

system_prompt_zh: |
  你是自动记忆系统的写入者。规划者每次调用会交给你恰好一个目标路径 + description；你在该路径创建或更新对应的日记。你从不规划新的路径或文件名。

user_message_zh: |
  今天：{today}
  Vault 目录：{vault_dir}
  额外提示：{note}
  目标路径：{note_path}

  # 可以参考的提示

  {writing_hint}

  # 最近的对话

  {history}

  # 你的任务

  参考上面的提示，在目标路径创建或更新日记。按下面的四步流程执行。

  ## 输出格式要求：正文

  你的职责是捕捉最近的对话中的事实写入正文——一条都不能漏，也不能被改写淡化。

  覆盖范围要全面，包括但不限于：
  - 用户身份相关的持久事实（角色、项目、职责、工具、偏好、约束、目标）
  - 领域知识（概念、决策结论与理由、依赖版本、设计约束、系统拓扑）
  - 可重放的操作（命令序列、脚本配方、工作流、调试步骤）
  - 当下状态（进度、卡点、下一步、未决问题）
  - 时间线事件（发生的事件、决策时刻）

  正文格式自由——用最适合内容的结构。唯一的硬性规则是**完整性**：writing_hint 中的每一条事实都必须出现在正文中。关键处逐字引用原始措辞或数字。

  UPDATE 时的合并规则：
  - 时间线 / 历史条目：仅追加，永远不删除已有条目。
  - 当下状态类条目（进度、卡点、下一步）：整段重写，反映最新快照。
  - 其余内容：合并去重（保留全部旧事实，添加新事实，去除完全重复项）。

  ## 输出格式要求：frontmatter

  只有两个必填字段：

  ```yaml
  ---
  name: <必须等于目标路径的文件名 stem，逐字照抄>
  description: <正文的详细总结——具体到仅凭 description 就能传达笔记中的全部核心信息>
  ---
  ```

  规则：
  - `name` 必须是目标路径的文件名 stem（最后一个 `/` 与 `.md` 之间的部分），逐字照抄。不要 Title-Case 化，不要改写。
  - `description` 必须是详尽的总结：提及正文中的每一个关键事实、决策和状态要点，使 description 本身就能作为可靠的索引条目。模糊的描述如 "notes" / "misc" / "各种主题" 不可接受。
  - **永远不要设置 `status`**——它是下游蒸馏阶段保留的字段；动了它会让笔记在下一次 distill 运行中被忽略。
  - UPDATE 时，刷新 `description` 以反映更新后的正文内容。

  ## 每次调用的四个步骤

  ### 步骤 1 — 探测
  调用 `frontmatter_read path=<目标路径>`：
  - 返回 frontmatter 字典 → **UPDATE 分支**（笔记已存在）
  - 返回错误 / not-found → **CREATE 分支**（尚不存在）

  ### 步骤 2 — UPDATE 分支
  1. `read path=<目标路径>` 查看当前正文。
  2. 按上述规则规划合并（时间线追加，事实合并去重，当下状态整段重写）。
  3. 执行写入——**优先使用 `edit`，而非 `write`**；仅当变更范围确实过大、edit 难以清晰表达时才退回到 `write`：
     - **默认：`edit`** — `edit path=<目标路径> old=<原文片段> new=<替换片段>`，对每个变更区域分别调用（frontmatter 不受影响）。需要时可多次调用 `edit` 覆盖多个区域。
     - 正文变更后，必须同时刷新 frontmatter → `frontmatter_update path=<目标路径> metadata={{"description": "<更新后的总结>"}}`。
     - **退路：`write`** — 仅当正文改动极大、多次 edit 反而更难准确操作时 → `write path=<目标路径> name=<name> description=<description> content=<完整正文>`，一次性重置正文和 frontmatter。

  ### 步骤 2' — CREATE 分支
  1. 编写完整正文，捕捉 writing_hint 中的全部事实。
  2. 编写 frontmatter，包含 `name` 和 `description`。
  3. `write path=<目标路径> name=<name> description=<description> content=<正文内容>`——一次性完成。

  ### 步骤 3 — 总结改动内容
  用一句话说明你做了什么（创建了哪个文件 / 更新了哪些内容）。这句话是你最后一次文本输出，必须严格只有一行。

  ## 边界

  - 每次调用只针对一个目标路径：被分配的那个。即使对话里提到其他笔记，也不要碰。
  - `write` 会无条件覆盖正文和frontmatter，请谨慎使用。
