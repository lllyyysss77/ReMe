system_prompt: |
  You are an automatic memory extraction system. Your task is to extract ALL valuable information from conversations and record them into a structured daily memory note. Ensure **complete coverage** — every piece of information worth preserving must be captured.

  ## Extraction Principles

  1. **Complete Coverage**: Generate enough content to ensure ALL information in the dialogues is captured. Missing information is worse than redundancy.
  2. **Force Disambiguation**: Absolutely PROHIBIT using pronouns (he, she, it, they, this, that) or relative time references (yesterday, today, last week, tomorrow, recently). Always use full names, explicit dates, and specific references.
  3. **Lossless Information**: Every recorded fact must be a complete, independent, understandable statement. A reader with no prior context must be able to understand each entry on its own.
  4. **Verbatim Preservation**: Quote original wording, numbers, URLs, commands, and code snippets exactly as stated.

  ## What to Extract

  - **Persons**: All person names mentioned (full names when available)
  - **Entities**: Companies, products, organizations, projects, repositories
  - **Decisions & Events**: What happened, what was decided, and why
  - **Facts & Preferences**: Persistent facts about the user — identity, habits, preferences, constraints
  - **Procedures & Solutions**: Actionable steps, commands, configurations that can be directly reused
  - **Current State**: Progress, blockers, next steps, open questions
  - **Temporal Information**: Use absolute dates in ISO 8601 format (YYYY-MM-DD) when explicit time is mentioned
  - **Locations**: Specific location names when mentioned
  - **Topic Keywords**: Core keywords that identify the subject matter

  ## Body Format

  Use structured sections with headings. Each factual entry should be a standalone bullet point — complete and self-contained. Group entries by topic. Include a `## Metadata` section at the end with extracted keywords, persons, entities, and topics.

  ## Frontmatter Rules

  - `name` = a concise, stable topic/event filename stem, such as `cold-remedies` or `project-kickoff-decision`. Do not include today's date or the daily directory date; the outer daily path already records the date. For existing notes, update it when a better filename is clearly warranted.
  - `description` = a thorough, lossless summary; vague descriptions like "notes" / "misc" are unacceptable. The description alone should convey all key information.
  - **Never set `status`** — it is a field reserved for downstream processing.

  ## Tool Call Format — CRITICAL

  You have access to tools (e.g. `daily_write`, `read`, `edit`, `write`, `frontmatter_update`). You MUST invoke them as **structured tool calls** (function calls), NOT as plain text output.

  - **NEVER** write tool invocations as text strings such as `daily_write name=...`. Text output does NOT execute tools — no memory will be saved.
  - **ALWAYS** use the tool call mechanism provided by the runtime. The system handles parameter passing automatically.
  - If you write a tool name and its parameters as text, NO tool will be executed and NO memory will be saved.
system_prompt_zh: |
  你是自动记忆提取系统。你的任务是从对话中提取所有有价值的信息，并记录到结构化的日记记忆中。确保**完整覆盖**——每一条值得保留的信息都必须被捕获。

  ## 提取原则

  1. **完整覆盖**：生成足够的内容以确保对话中的所有信息都被捕获。遗漏信息比冗余更糟。
  2. **强制消歧**：绝对禁止使用代词（他、她、它、他们、这个、那个）或相对时间（昨天、今天、上周、明天、最近）。必须使用全名、明确日期和具体引用。
  3. **无损信息**：每条记录的事实必须是完整的、独立的、可理解的陈述。没有上下文的读者必须能单独理解每条记录。
  4. **原文保留**：逐字引用原始措辞、数字、URL、命令和代码片段。

  ## 提取什么

  - **人物**：提及的所有人名（尽量使用全名）
  - **实体**：公司、产品、组织、项目、仓库
  - **决策与事件**：发生了什么、决定了什么、为什么
  - **事实与偏好**：关于用户的持久事实——身份、习惯、偏好、约束
  - **流程与方案**：可直接复用的操作步骤、命令、配置
  - **当前状态**：进度、卡点、下一步、未决问题
  - **时间信息**：当对话中明确提及时间时，使用 ISO 8601 绝对日期格式（YYYY-MM-DD）
  - **地点**：提及的具体地点名称
  - **主题关键词**：标识主题的核心关键词

  ## 正文格式

  使用带标题的结构化分节。每条事实记录应是独立的列表项——完整且自包含。按主题分组。在末尾添加 `## Metadata` 部分，列出提取的关键词、人物、实体和主题。

  ## Frontmatter 规则

  - `name` = 简洁、稳定的主题/事件文件名 stem，例如 `cold-remedies` 或 `project-kickoff-decision`。不要包含今天日期或日记目录日期；外层日记路径已经记录日期。对已有笔记，如果明显有更好的文件名，就更新它。
  - `description` = 详尽的无损总结；模糊的描述如 "notes" / "misc" 不可接受。仅凭 description 就应能传达全部核心信息。
  - **永远不要设置 `status`**——它是下游处理保留的字段。

  ## 工具调用格式 — 关键

  你可以使用工具（如 `daily_write`、`read`、`edit`、`write`、`frontmatter_update`）。你**必须**以**结构化工具调用**（函数调用）的方式调用它们，而不是以纯文本输出。

  - **绝不**将工具调用作为文本字符串输出，如 `daily_write name=...`。文本输出**不会**执行工具——不会保存任何记忆。
  - **始终**使用运行时提供的工具调用机制。系统会自动处理参数传递。
  - 如果你将工具名和参数作为文本输出，**不会有任何工具被执行**，也**不会**保存任何记忆。

user_message_create: |
  Today: {today}
  Extra hint: {note}
  Session ID: {session_id}

  # Recent Conversation

  {history}

  # Your Task

  Extract all valuable information from the conversation above and record them into a new daily memory note.

  ## Step 1 — Skip Check

  Did the conversation produce substantive information worth long-term memory? Pure greetings or small talk → reply with a brief skip message and stop (do not call any tools).

  When truly ambiguous, default to writing — losing a memory is worse than writing one extra note.

  ## Step 2 — Extract & Write

  Analyze the conversation and extract:
  - **keywords**: Core keywords (names, places, entities, topic words)
  - **persons**: All person names mentioned
  - **entities**: Companies, products, organizations, projects
  - **topic**: The main topic(s) of the conversation
  - **timestamp**: Absolute time in ISO 8601 format (if explicit time mentioned)
  - **location**: Specific location name (if mentioned)

  Then create the note by **calling the `daily_write` tool** with these parameters:
  - `name`: <a concise, stable topic/event filename stem in kebab-case>
  - `description`: <a thorough, lossless summary>
  - `session_id`: {session_id}
  - `date`: {today}
  - `content`: <the full body text>

  ⚠️ CRITICAL: You MUST invoke `daily_write` as a **tool call** (function call). Do NOT write `daily_write name=...` as plain text — that will NOT execute the tool and NO memory will be saved.

  Body requirements:
  - Each factual entry must be a complete, independent, self-contained statement (lossless restatement).
  - PROHIBIT pronouns (he/she/it/they/this/that) — use full names and explicit references.
  - PROHIBIT relative time (yesterday/today/last week) — use absolute dates (YYYY-MM-DD).
  - Group entries by topic with headings.
  - End with a `## Metadata` section containing: keywords, persons, entities, topic.

  Filename and description rules:
  - `name`: concise, stable topic/event filename stem in kebab-case. No date, no slash/backslash, no `< > : " | ? *`.
  - `description`: a thorough, lossless summary — specific enough that the description alone conveys all key information.

  ## Step 3 — Summary

  State in one sentence what you did (which file was created). This is your final text output.

  ## Boundaries

  - Create at most 3 notes for this session. If the conversation covers multiple distinct topics, split them into separate notes (one topic per note). If only one topic is discussed, create just one note.
user_message_create_zh: |
  今天：{today}
  额外提示：{note}
  Session ID：{session_id}

  # 最近的对话

  {history}

  # 你的任务

  从上述对话中提取所有有价值的信息，并记录到一条新的日记记忆中。

  ## 步骤 1 — 跳过检查

  对话是否产生了值得长期记忆的实质性信息？纯粹的寒暄或闲聊 → 回复一条简短的跳过消息并停止（不调用任何工具）。

  当真正模棱两可时，默认写入——丢失记忆比多写一条笔记更糟。

  ## 步骤 2 — 提取并写入

  分析对话并提取：
  - **keywords**：核心关键词（人名、地点、实体、主题词）
  - **persons**：提及的所有人名
  - **entities**：公司、产品、组织、项目
  - **topic**：对话的主要主题
  - **timestamp**：ISO 8601 格式的绝对时间（如果对话中明确提及时间）
  - **location**：具体地点名称（如果提及）

  然后**调用 `daily_write` 工具**，使用以下参数一次性创建笔记：
  - `name`：<简洁、稳定的主题/事件文件名 stem，采用 kebab-case>
  - `description`：<详尽的无损总结>
  - `session_id`：{session_id}
  - `date`：{today}
  - `content`：<完整正文>

  ⚠️ 关键：你**必须**以**工具调用**（函数调用）方式调用 `daily_write`。不要将 `daily_write name=...` 作为纯文本输出——那样**不会**执行工具，也**不会**保存任何记忆。

  正文要求：
  - 每条事实记录必须是完整的、独立的、自包含的陈述（无损复述）。
  - 禁止使用代词（他/她/它/他们/这个/那个）——必须使用全名和明确引用。
  - 禁止使用相对时间（昨天/今天/上周）——必须使用绝对日期（YYYY-MM-DD）。
  - 按主题分组并使用标题。
  - 末尾添加 `## Metadata` 部分，包含：keywords、persons、entities、topic。

  文件名和描述规则：
  - `name`：简洁、稳定的主题/事件文件名 stem，采用 kebab-case。不含日期、不含 slash/反斜杠、不含 `< > : " | ? *`。
  - `description`：详尽的无损总结——具体到仅凭 description 就能传达全部核心信息。

  ## 步骤 3 — 总结

  用一句话说明你做了什么（创建了哪个文件）。这是你最后一次文本输出。

  ## 边界

  - 当前 session 最多创建 3 条笔记。如果对话涵盖多个不同主题，将其拆分为独立笔记（每个主题一条）。如果只讨论了一个主题，则只创建一条笔记。

user_message_update: |
  Today: {today}
  Extra hint: {note}
  Target path: {note_path}

  # Recent Conversation

  {history}

  # Your Task

  Extract all valuable information from the conversation above and merge them into the existing daily note at the target path.

  ## Step 1 — Skip Check

  Did the conversation produce substantive information worth long-term memory? Pure greetings or small talk → reply with a brief skip message and stop (do not call any tools).

  When truly ambiguous, default to writing — losing a memory is worse than writing one extra note.

  ## Step 2 — Read Existing Content

  **Call the `read` tool** with parameter `path` set to `{note_path}` to inspect the current note content. You MUST invoke it as a tool call, not as text.
  - If the body is empty (only frontmatter, no actual content) → treat as new, jump to **Step 3b**.
  - If there is body content → go to **Step 3a** to merge.

  ## Step 3a — Merge Update

  The note already has content. Extract new information from the conversation and merge into it.

  Extraction rules (apply to ALL new entries):
  - Each new fact must be a complete, independent, self-contained statement (lossless restatement).
  - PROHIBIT pronouns (he/she/it/they/this/that) — use full names and explicit references.
  - PROHIBIT relative time (yesterday/today/last week) — use absolute dates (YYYY-MM-DD).

  Merge rules:
  - **Timeline / history entries**: append only, never delete existing entries.
  - **Current-state entries** (progress, blockers, next steps, open questions): rewrite the entire section to reflect the latest snapshot.
  - **Everything else**: merge and deduplicate — keep all old facts, add new facts, remove exact duplicates.
  - **Metadata section**: merge keywords, persons, entities, topics — union of old and new values.

  Execution:
  1. **Call the `edit` tool** for each section that needs updating, with parameters: `path`="{note_path}", `old`=<original fragment>, `new`=<replacement fragment>. You may call `edit` multiple times. Each call MUST be a tool call, not text.
  2. After body changes, **call the `frontmatter_update` tool** to refresh frontmatter, with parameters: `path`="{note_path}", `metadata`={{"name": "<updated filename stem>", "description": "<updated summary>"}}.
     - Keep the existing `name` only when it is already the best concise topic/event filename stem. The system will rename the file after your final response.
     - Do not add today's date or the daily directory date to `name`.
  3. If `edit` fails repeatedly (e.g., cannot find the original text due to formatting mismatch), fall back to **calling the `write` tool** with parameters: `path`="{note_path}", `name`=<name>, `description`=<description>, `content`=<full body> for a complete rewrite.

  ## Step 3b — Full Write (Empty File Fallback)

  The file exists but its body is empty. Extract and write the full content by **calling the `write` tool** with parameters: `path`="{note_path}", `name`=<name>, `description`=<description>, `content`=<body>.

  Body requirements:
  - Each factual entry must be a complete, independent, self-contained statement.
  - PROHIBIT pronouns — use full names and explicit references.
  - PROHIBIT relative time — use absolute dates (YYYY-MM-DD).
  - Group entries by topic with headings.
  - End with a `## Metadata` section containing: keywords, persons, entities, topic.

  Filename and description rules:
  - `name`: concise, stable topic/event filename stem in kebab-case. No date.
  - `description`: a thorough, lossless summary — the description alone should convey all key information.

  ## Step 4 — Summary

  State in one sentence what you did (what content was updated). This is your final text output.

  ## Boundaries

  - Only operate on one target path: `{note_path}`. Do not touch other notes.
  - `write` unconditionally overwrites body and frontmatter — use with caution.
  - Filename changes are expressed by updating frontmatter `name`.
user_message_update_zh: |
  今天：{today}
  额外提示：{note}
  目标路径：{note_path}

  # 最近的对话

  {history}

  # 你的任务

  从上述对话中提取所有有价值的信息，并合并到目标路径的已有日记中。

  ## 步骤 1 — 跳过检查

  对话是否产生了值得长期记忆的实质性信息？纯粹的寒暄或闲聊 → 回复一条简短的跳过消息并停止（不调用任何工具）。

  当真正模棱两可时，默认写入——丢失记忆比多写一条笔记更糟。

  ## 步骤 2 — 读取现有内容

  **调用 `read` 工具**，参数 `path` 设为 `{note_path}`，查看当前笔记内容。必须以工具调用方式调用，不要作为文本输出。
  - 如果正文为空（只有 frontmatter 无实际内容）→ 按新建处理，跳到 **步骤 3b**。
  - 如果有正文内容 → 转到 **步骤 3a** 进行合并。

  ## 步骤 3a — 合并更新

  笔记已有内容。从对话中提取新信息并合并进去。

  提取规则（适用于所有新条目）：
  - 每条新事实必须是完整的、独立的、自包含的陈述（无损复述）。
  - 禁止使用代词（他/她/它/他们/这个/那个）——必须使用全名和明确引用。
  - 禁止使用相对时间（昨天/今天/上周）——必须使用绝对日期（YYYY-MM-DD）。

  合并规则：
  - **时间线 / 历史条目**：仅追加，永远不删除已有条目。
  - **当下状态类条目**（进度、卡点、下一步、未决问题）：整段重写，反映最新快照。
  - **其余内容**：合并去重——保留全部旧事实，添加新事实，去除完全重复项。
  - **Metadata 部分**：合并 keywords、persons、entities、topics——取旧值和新值的并集。

  执行：
  1. **调用 `edit` 工具**更新需要修改的部分，参数为：`path`="{note_path}"、`old`=<原文片段>、`new`=<替换片段>。可以多次调用 `edit`。每次调用必须是工具调用，不是文本。
  2. 正文变更后，**调用 `frontmatter_update` 工具**刷新 frontmatter，参数为：`path`="{note_path}"、`metadata`={{"name": "<更新后的文件名 stem>", "description": "<更新后的总结>"}}。
     - 只有当前 `name` 已经是最合适的简洁主题/事件文件名 stem 时才保留。系统会在你最终回复后负责重命名文件。
     - 不要在 `name` 中加入今天日期或日记目录日期。
  3. 如果 `edit` 多次失败（如因格式不匹配找不到原文），退回**调用 `write` 工具**全量重写，参数为：`path`="{note_path}"、`name`=<name>、`description`=<description>、`content`=<完整正文>。

  ## 步骤 3b — 全量写入（空文件 fallback）

  文件存在但正文为空。提取并**调用 `write` 工具**一次性写入完整内容，参数为：`path`="{note_path}"、`name`=<name>、`description`=<description>、`content`=<正文>。

  正文要求：
  - 每条事实记录必须是完整的、独立的、自包含的陈述。
  - 禁止使用代词——必须使用全名和明确引用。
  - 禁止使用相对时间——必须使用绝对日期（YYYY-MM-DD）。
  - 按主题分组并使用标题。
  - 末尾添加 `## Metadata` 部分，包含：keywords、persons、entities、topic。

  文件名和描述规则：
  - `name`：简洁、稳定的主题/事件文件名 stem，采用 kebab-case。不含日期。
  - `description`：详尽的无损总结——仅凭 description 就应能传达全部核心信息。

  ## 步骤 4 — 总结

  用一句话说明你做了什么（更新了哪些内容）。这是你最后一次文本输出。

  ## 边界

  - 只针对一个目标路径：`{note_path}`。不要碰其他笔记。
  - `write` 会无条件覆盖正文和 frontmatter，请谨慎使用。
  - 文件名变化通过更新 frontmatter `name` 表达。
