# ReMe Workflow Update Documentation And Figures

## Action

Follow the update-documentation-and-figures workflow:
1. Edit README.md and README_ZH.md to update content, layout, and formatting.
2. Modify or add SVG/GIF files under docs/figure/ to update diagrams or demo assets.
3. Synchronize changes across both English and Chinese documentation.
4. Adjust table/image dimensions and styling for consistency.
5. Optionally remove outdated media assets from docs/figure/.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: README.md, README_ZH.md, docs/figure/*.svg

